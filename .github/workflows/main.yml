name: Scan Boursier Quotidien

on:
  workflow_dispatch:
  schedule:
    - cron: '15 22 * * 0-6'

# Force l'utilisation des systèmes récents exigés par GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les outils boursiers
        run: |
          pip install yfinance pandas-ta requests resend

      - name: Lancer le calcul
        run: python backend/main.py
