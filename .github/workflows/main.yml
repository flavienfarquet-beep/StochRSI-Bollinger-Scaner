name: Scan Boursier Quotidien

on:
  workflow_dispatch: # <--- C'EST CETTE LIGNE QUI CRÉE LE BOUTON MANUEL
  schedule:
    - cron: '0 22 * * 0-6'

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les outils boursiers
        run: |
          pip install yfinance pandas-ta requests resend

      - name: Lancer le calcul
        run: python backend/main.py # Vérifiez bien que ce chemin est le bon sur votre GitHub !
        
